name: sunshine-club

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sunshine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local}
      POSTGRES_DB: ${POSTGRES_DB:-sunshine_club}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.27.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-sunshine}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-local}
      POSTGRES_SEEDS: db
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${DASHBOARD_PORT:-3000}
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"

  api:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      target: dev
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sunshine}:${POSTGRES_PASSWORD:-local}@db:5432/${POSTGRES_DB:-sunshine_club}
      TEMPORAL_ADDRESS: temporal:7233
      SUNSHINE_NAS_ROOT: /mnt/sunshine
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${SUNSHINE_NAS_ROOT:-/mnt/sunshine}:/mnt/sunshine:ro
    command: ["uvicorn", "sunshine_api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
      target: dev
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"

  worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      target: dev
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sunshine}:${POSTGRES_PASSWORD:-local}@db:5432/${POSTGRES_DB:-sunshine_club}
      TEMPORAL_ADDRESS: temporal:7233
      SUNSHINE_NAS_ROOT: /mnt/sunshine
    volumes:
      - ${SUNSHINE_NAS_ROOT:-/mnt/sunshine}:/mnt/sunshine:ro
    command:
      - python
      - -c
      - "import asyncio; from sunshine_worker.temporal_worker import run_worker; asyncio.run(run_worker())"

volumes:
  postgres_data:
